# -----------------------------------------------
# DEV profile — uses H2 in-memory DB (no MySQL)
# Run with: mvnw.cmd spring-boot:run -Dspring-boot.run.profiles=dev
# -----------------------------------------------

spring.datasource.url=jdbc:h2:mem:kolay_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true

# H2 console at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Server
server.port=8080

# JWT
kolay.app.jwtSecret=KolayRestaurantSecretKeyForJWTAuth_Premium_Secure_LongEnoughKey
kolay.app.jwtExpirationMs=86400000
