spring.application.name=KRMS_API

# Database Configuration (overridden by environment variables in production)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/kolay_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server Port
server.port=${PORT:8080}

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.authentication=DEBUG

# KRMS Custom Properties
kolay.app.jwtSecret=${JWT_SECRET:KolayRestaurantSecretKeyForJWTAuth_Premium_Secure_LongEnoughKey}
kolay.app.jwtExpirationMs=86400000
