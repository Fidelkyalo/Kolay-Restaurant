spring.application.name=KRMS_API

# Database Configuration (Placeholder - User should update with actual MySQL credentials)
spring.datasource.url=jdbc:mysql://localhost:3306/kolay_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server Port
server.port=8080

# Logging
logging.level.org.springframework.security=DEBUG

# KRMS Custom Properties
kolay.app.jwtSecret=KolayRestaurantSecretKeyForJWTAuth_Premium_Secure_LongEnoughKey
kolay.app.jwtExpirationMs=86400000
